<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sungat</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./style.css" />
    <script src="./scripts.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  </head>
  <body>
    <div id="space-container"></div>
    <header class="site-header">
      <div class="contact-icons">
        <a
          href="https://www.linkedin.com/in/sungat"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img
            src="./images/linkedin.png"
            alt="LinkedIn Logo"
            class="linkedin-logo"
          />
        </a>
        <a
          href="https://github.com/sungatshienh"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img
            src="./images/github.png"
            alt="GitHub Logo"
            class="github-logo"
          />
        </a>
      </div>
      <button id="space-toggle" class="space-toggle-btn" type="button">
        <img src="./images/astronaut.png" alt="" class="space-toggle-icon" />
      </button>
      <div class="pip-divider"></div>
      <button id="pip-toggle" class="pip-toggle-btn" type="button">
        <svg
          class="pip-toggle-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      <div id="pip-panel" class="pip-panel" hidden>
        <div id="pip-frame" class="pip-frame" role="button" tabindex="0">
          <iframe id="pip-iframe" tabindex="-1"></iframe>
        </div>
      </div>
    </header>
    <main>
      <section>
        <h2>About Me</h2>
        <p>
          I'm Sungat, a student at the University of Michigan studying Computer
          Science.
        </p>
      </section>
      <section>
        <h2>Hobbies</h2>
        <p>Bhangra</p>
      </section>
      <section id="projects">
        <h2>Projects</h2>
        <div class="project-list">
          <div class="project-card">
            <div class="project-icon-box">
              <img
                src="./images/CV-logo.png"
                alt="OpenEye icon"
                class="project-icon"
              />
            </div>
            <div class="project-content">
              <h3>OpenEye</h3>
              <p>Real-time object detection and identification.</p>
            </div>
          </div>
          <div class="project-card">
            <div class="project-icon-box">
              <img
                src="./images/WAVy-icon.png"
                alt="WAVy icon"
                class="project-icon"
              />
            </div>
            <div class="project-content">
              <h3>WAVy</h3>
              <p>App with stem separation and mastering tools.</p>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="./space.js" defer></script>
  </body>
</html>
