<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sungat</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./style.css" />
    <script src="./scripts.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  </head>
  <body>
    <svg class="glass-filter-defs" aria-hidden="true" focusable="false">
      <filter
        id="liquid-glass-distortion"
        x="-20%"
        y="-20%"
        width="140%"
        height="140%"
      >
        <feTurbulence
          type="fractalNoise"
          baseFrequency="0.008 0.012"
          numOctaves="2"
          seed="7"
          result="noise"
        />
        <feGaussianBlur in="noise" stdDeviation="3" result="blurredNoise" />
        <feDisplacementMap
          in="SourceGraphic"
          in2="blurredNoise"
          scale="45"
          xChannelSelector="R"
          yChannelSelector="G"
        />
      </filter>
    </svg>
    <div id="space-container"></div>
    <div class="starfield" aria-hidden="true"></div>
    <script>
      // Scatter twinkling sparkle-stars across the fixed background layer.
      (function () {
        var field = document.querySelector(".starfield");
        if (!field) return;
        var COUNT = 60;
        for (var i = 0; i < COUNT; i++) {
          var s = document.createElement("span");
          s.className = "star-sparkle";
          s.style.left = Math.random() * 100 + "vw";
          s.style.top = Math.random() * 100 + "vh";
          s.style.setProperty("--dur", (2 + Math.random() * 3).toFixed(2) + "s");
          s.style.setProperty("--delay", (Math.random() * 4).toFixed(2) + "s");
          field.appendChild(s);
        }
      })();
    </script>
    <header class="site-header">
      <div class="contact-icons">
        <a
          href="https://www.linkedin.com/in/sungat"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img
            src="./images/linkedin.png"
            alt="LinkedIn Logo"
            class="linkedin-logo"
          />
        </a>
        <div class="header-divider"></div>
        <a
          href="https://github.com/sungatshienh"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img
            src="./images/github.png"
            alt="GitHub Logo"
            class="github-logo"
          />
        </a>
      </div>
      <div class="header-divider"></div>
      <button id="space-toggle" class="space-toggle-btn" type="button">
        <img src="./images/astronaut.png" alt="" class="space-toggle-icon" />
      </button>
      <div class="header-divider"></div>
      <button id="pip-toggle" class="pip-toggle-btn" type="button">
        <svg
          class="pip-toggle-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="6 15 12 9 18 15"></polyline>
        </svg>
      </button>
      <div id="pip-panel" class="pip-panel" hidden>
        <div id="pip-frame" class="pip-frame" role="button" tabindex="0">
          <iframe id="pip-iframe" tabindex="-1"></iframe>
        </div>
      </div>
    </header>
    <main>
      <section id="about-me">
        <h2>About Me</h2>
        <p>
          I'm Sungat, a student at the University of Michigan studying Computer
          Science.
        </p>
      </section>
      <section id="projects">
        <h2>Projects</h2>
        <div class="project-list">
          <div class="project-card">
            <div class="project-icon-box">
              <img
                src="./images/CV-logo.png"
                alt="OpenEye icon"
                class="project-icon"
              />
            </div>
            <div class="project-content">
              <h3>OpenEye</h3>
              <p>Real-time object detection and identification.</p>
            </div>
            <span class="project-arrow" aria-hidden="true">&#8599;</span>
          </div>
          <a class="project-card" href="https://sungatshienh.github.io/WAVy/" target="_blank" rel="noopener noreferrer">
            <div class="project-icon-box">
              <img
                src="./images/WAVy-icon.png"
                alt="WAVy icon"
                class="project-icon"
              />
            </div>
            <div class="project-content">
              <h3>WAVy</h3>
              <p>App with stem separation and mastering tools.</p>
            </div>
            <span class="project-arrow" aria-hidden="true">&#8599;</span>
          </a>
        </div>
      </section>
    </main>
    <script src="./space.js" defer></script>
  </body>
</html>
